# Alembic config for gymbox. The library ships its own migration tree; the
# integrator runs `alembic upgrade head` against their database (architecture.md
# §5, §9). The DB URL is taken from the GYMBOX_DB_URL env var (see env.py), so
# sqlalchemy.url below is only a placeholder.
[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = postgresql+asyncpg://gymbox:gymbox@localhost/gymbox

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
